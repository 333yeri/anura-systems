<!DOCTYPE html>
<html><head><title>Yeri Test</title>
<style>body{margin:0;overflow:hidden;background:#000;}canvas{display:block;}</style>
</head><body>
<script type="importmap">
{ "imports": { "three": "/node_modules/.vite/deps/three.js", "three/addons/": "/node_modules/three/examples/jsm/" } }
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a2028);
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(3, 2, 3);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.4;
document.body.appendChild(renderer.domElement);
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1, 0);
controls.update();

scene.add(new THREE.AmbientLight(0x5a6a7a, 2.0));
const dir = new THREE.DirectionalLight(0xffffff, 1.5);
dir.position.set(3, 5, 4);
scene.add(dir);
scene.add(new THREE.HemisphereLight(0x7a8aa0, 0x3a4a3a, 1.2));

const grid = new THREE.GridHelper(10, 10, 0x4a5260, 0x232830);
scene.add(grid);

const loader = new GLTFLoader();
const info = document.createElement('div');
info.style.cssText = 'position:fixed;top:0;left:0;background:#000c;color:#0f0;padding:8px;font:11px monospace;z-index:99;max-width:90vw;';
document.body.appendChild(info);

info.innerHTML = 'loading yeri.glb ...';
loader.load('/assets/models/yeri.glb', (gltf) => {
  const obj = gltf.scene;
  const bbox = new THREE.Box3().setFromObject(obj);
  const size = bbox.getSize(new THREE.Vector3());
  const center = bbox.getCenter(new THREE.Vector3());
  obj.position.sub(center);
  obj.position.y += size.y / 2;
  const targetHeight = 1.8;
  const scale = targetHeight / size.y;
  obj.scale.setScalar(scale);
  obj.traverse(o => {
    if (!o.isMesh) return;
    const m = o.material;
    if (m.map) m.map.colorSpace = THREE.SRGBColorSpace;
    if (m.normalMap) m.normalMap.colorSpace = THREE.NoColorSpace;
    if (m.emissiveMap) m.emissiveMap.colorSpace = THREE.SRGBColorSpace;
  });
  scene.add(obj);
  info.innerHTML = 'YERI loaded\nbbox size: ' + size.toArray().map(n => n.toFixed(2)).join(', ') + '\nscale: ' + scale.toFixed(3) + '\ntris: 317,796\njoints: 25\ndrag mouse to orbit';
}, undefined, (err) => {
  info.innerHTML = 'ERROR: ' + err.message;
});

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body></html>
